name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine version
        id: version
        shell: bash
        run: |
          # Get the latest release tag (e.g. v1.2.3), default to v0.0.0
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          # Strip the 'v' prefix and split
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Increment patch
          PATCH=$((PATCH + 1))

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $NEW_VERSION"

      - name: Build
        run: dotnet build Installer/Installer.wixproj -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Rename MSI
        shell: bash
        run: mv Installer/bin/Release/Installer.msi Installer/bin/Release/RaymondExtendsExplorer-${{ steps.version.outputs.version }}.msi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create ${{ steps.version.outputs.tag }}
          Installer/bin/Release/RaymondExtendsExplorer-${{ steps.version.outputs.version }}.msi
          --title "Release ${{ steps.version.outputs.tag }}"
          --generate-notes
